training:
    seed: 42
    early_stopping_patience: 5  # Stop after this many val epochs without improvement
    fit:
        accelerator: "gpu"        # Read by pl.Trainer — "gpu", "cpu", "tpu"
        devices: 1               # Number of GPUs to use (SLURM assigns via CUDA_VISIBLE_DEVICES)
        max_epochs: 100
        distribution_strategy: "ddp"   # DistributedDataParallel for multi-GPU
        precision: "16-mixed"          # AMP: float16 forward pass, float32 grad accumulation
    test_no_batches: 10  # Set to an int (e.g. 20) for a fast sanity-check run, otherwise keep it null for a full run

models:
    pretrain_path: null  # Path to .ckpt to load pretrained weights, or null
    ckpt_path: null  # null to start fresh, path to resume
    to_store_path: "/data_hgx/KM3NeT/ML_graphnet/ckpt"  # Directory to save checkpoints

logs:
    logger: "mlflow"  # "mlflow" or "tensorboard"
    experiment_name: "Prometheus - nuT"
    run_name: "Track shower all hits"
    run_id: null  # mlflow only: null to create a new run
    dir: "/data_hgx/KM3NeT/ML_graphnet/mlflow_logs/"  # mlflow: tracking dir; tensorboard: save_dir
    tags: null  # mlflow only
    steps: 100  # Log metrics every N training steps

detector:
    name: "PrometheusDetector"   # Class name from detector.py — change this to switch detectors without touching the training script

data:
    features:
        - "sensor_pos_x"   # Sensor x-position (m)
        - "sensor_pos_y"   # Sensor y-position (m)
        - "sensor_pos_z"   # Sensor z-position (m)
        - "t"              # Hit time (ns)
        - "charge"         # Hit charge (PE)
        - "string_id"      # String/DU identifier (used by STRING pairwise mask; stripped before transformer)
    truth:
        - "initial_state_energy"   # Neutrino energy (GeV) — target for energy task

node_definition:
    max_hits: 300           # Maximum hits per event passed to the transformer
    trig_name: "is_signal"  # Column name of signal/noise flag (1=signal photon, 0=noise)
    unique: false           # If true, keep only the first hit per PMT before subsampling

dataloader:
    path: "/data_hgx/KM3NeT/ML_data/PROMETHEUS/ORCA/merged.db"
    pulsemap: "merged_photons"
    truth_table_name: "mc_truth"
    batch_size: 32           # Events per batch (reduce to 32 for debugging)
    num_workers: 64          # DataLoader workers — match cpus-per-task in SLURM job script
    validation_size: 0.1    # Fraction of events reserved for validation
    event_selection: None
    events: null
    exclude: null
    percentage: 1.

backbone:
    name: "nuT_PROMETHEUS"     # Model class: "nuT", "nuT_PROMETHEUS", or "nuT_vanilla"
    emb_type: "nuT"            # "nuT" (linear), "Kaggle" (2-layer MLP), "ParticleTransformer"
    abs_position_encoding: false
    emb_dims:
        - 128                  # Model dimension
    num_heads: 8               # Number of attention heads
    mode: 'concat'             # Pairwise mask combination: 'concat' (per-head) or 'sum'
    # Available masks:
    #   KM3NeT only  : 'DUs' (du_id), 'DOMs' (dom_id), 'PMTs' (channel_id)
    #   Prometheus only: 'STRING' (string_id)
    #   Both detectors : 'Euclidean', 'Causality'
    # Set to null to let the model pick the correct defaults for the detector automatically.
    masks: null
    refractive_index: 1.33     # Optical refractive index (water) for CausalityMask
    pairwise_dims:
        - 64                   # Hidden channels in the pairwise Conv2d projection
    dropout_attn: 0.2
    hidden_dim: 256            # Feed-forward network hidden dimension
    dropout_FFNN: 0.2
    no_hits_blocks: 8          # Encoder blocks on hits only (no CLS token)
    no_evt_blocks: 4           # Encoder blocks including CLS token (global event attention)

# Task to train. One of:
#   "Track shower classification"
#   "Energy reconstruction"
#   "Direction reconstruction"
task: "Track shower classification"

optimizer:
    parameters:
        lr: 1.0e-3
    scheduler_patience: 3  # ReduceLROnPlateau patience (epochs without val_loss improvement)
